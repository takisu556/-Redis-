<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>科技商城</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header">
        <h1 class="site-title">科技商城 | 尽享未来之美</h1>
        <button id="show-login-btn">登录</button>
    </header>

    <div class="banner" id="main-banner">
        <div class="banner-slider">
            <div class="banner-wrapper"></div>
            <div class="banner-dots"></div>
            <button class="banner-prev">❮</button>
            <button class="banner-next">❯</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar sidebar-expanded" id="sidebar">
            <button class="sidebar-toggle-btn" id="sidebar-toggle" title="收纳/展开">&#x25C0;</button>
            <h3>商品类别</h3>
            <ul id="category-menu" class="sidebar-category-list expanded">
                <li><button data-category="all" class="active">全部</button></li>
                <li><button data-category="Xiaomi">Xiaomi 数字旗舰</button></li>
                <li><button data-category="Redmi">REDMI 系列</button></li>
                <li><button data-category="Earpods">耳机</button></li>
                <li><button data-category="Watch">手表</button></li>
            </ul>
        </div>

        <div class="main">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜索商品关键词..." />
                <button id="search-btn">搜索</button>
            </div>
            <div class="product-list four" id="product-list"></div>
        </div>
    </div>

    <div class="cart" id="cart">
        <div id="cart-header" style="cursor:pointer;">
            <span id="cart-icon">🛒</span>
            <span id="cart-count">0</span>
            <span id="cart-title"></span>
        </div>
        <div id="cart-content">
            <div id="cart-list" class="cart-box-list"></div>
            <div id="cart-total"></div>
            <button id="checkout-btn" class="checkout-btn">结算</button>
        </div>
    </div>

    <!-- 登录弹窗 -->
<div class="modal" id="login-modal" style="display:none;">
  <div class="modal-content">
    <h2>用户登录</h2>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="login-username" maxlength="16" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" maxlength="16" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>验证码</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="text" id="login-captcha" maxlength="4" style="width:60px;">
        <span id="captcha-img" style="font-size:18px;letter-spacing:4px;cursor:pointer;"></span>
      </div>
    </div>
    <div class="form-group">
      <button id="login-submit">登录</button>
      <button id="login-cancel" type="button">取消</button>
    </div>
    <div id="login-error" style="color:#e74c3c;font-size:13px;margin-top:8px;"></div>
  </div>
</div>

    <script src="./index.js"></script>
</body>
</html>
