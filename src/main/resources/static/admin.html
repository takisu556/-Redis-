<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理后台</title>
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="./admin.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ 商品管理后台</h1>
            <p>管理商品库存、添加新商品、查看数据统计</p>
            <div class="header-actions" style="margin-top:8px;">
                <a class="btn btn-info" href="./orders.html" style="text-decoration:none; color:#fff; padding:6px 10px; border-radius:4px;">我的订单 / 历史订单</a>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>商品总数</h3>
                <div class="value" id="total-products">0</div>
            </div>
            <div class="stat-card">
                <h3>总库存</h3>
                <div class="value" id="total-stock">0</div>
            </div>
            <div class="stat-card">
                <h3>总价值</h3>
                <div class="value" id="total-value">¥0</div>
            </div>
            <div class="stat-card">
                <h3>商品分类</h3>
                <div class="value" id="total-categories">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2 class="section-title">添加/编辑商品</h2>
                <form id="product-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label>商品ID *</label>
                        <input type="text" id="product-id" required placeholder="例: 1">
                    </div>
                    <div class="form-group">
                        <label>商品名称 *</label>
                        <input type="text" id="product-name" required placeholder="例: Xiaomi 15S Pro">
                    </div>
                    <div class="form-group">
                        <label>价格 (元) *</label>
                        <input type="number" id="product-price" required step="0.01" placeholder="例: 5499">
                    </div>
                    <div class="form-group">
                        <label>库存数量 *</label>
                        <input type="number" id="product-quantity" required placeholder="例: 100">
                    </div>
                    <div class="form-group">
                        <label>商品分类 *</label>
                        <select id="product-category" required>
                            <option value="">请选择分类</option>
                            <option value="Xiaomi">Xiaomi</option>
                            <option value="Redmi">Redmi</option>
                            <option value="Watch">Watch</option>
                            <option value="Earpods">Earpods</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>图片URL</label>
                        <input type="url" id="product-img" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>从本地上传图片</label>
                        <input type="file" id="product-file" accept="image/*">
                        <button type="button" class="btn btn-secondary" id="upload-image-btn">上传图片</button>
                        <div class="image-preview" style="margin-top:8px;">
                            <img id="upload-preview" src="" alt="预览" style="max-width:120px; max-height:120px; display:none; border:1px solid #ddd; padding:4px;" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>详情链接</label>
                        <input type="url" id="product-link" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>商品标语</label>
                        <textarea id="product-slogan" placeholder="简短描述商品特点"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span id="submit-text">✨ 添加商品</span>
                    </button>
                    <button type="button" class="btn btn-warning" id="cancel-edit" style="display:none; width:100%; margin-top:10px;">
                        取消编辑
                    </button>
                </form>
            </div>

            <div class="table-section">
                <h2 class="section-title">商品列表</h2>
                
                <div class="action-buttons">
                    <button class="btn btn-success btn-small" onclick="refreshProducts()">
                        🔄 刷新数据
                    </button>
                    <button class="btn btn-warning btn-small" onclick="initializeData()">
                        📦 初始化数据
                    </button>
                    <button class="btn btn-danger btn-small" onclick="clearAllProducts()">
                        🗑️ 清空所有
                    </button>
                </div>

                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 搜索商品名称、分类...">
                </div>

                <div id="loading" class="loading" style="display:none;">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>

                <div id="products-container">
                    <table class="product-table" id="product-table">
                        <thead>
                            <tr>
                                <th>图片</th>
                                <th>ID</th>
                                <th>商品名称</th>
                                <th>分类</th>
                                <th>价格</th>
                                <th>库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="product-tbody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✅</span>
        <span class="toast-message">操作成功！</span>
    </div>

    <!-- 引入外部JS文件（放在body末尾确保DOM加载完成） -->
    <script src="./admin.js"></script>
</body>
</html>
