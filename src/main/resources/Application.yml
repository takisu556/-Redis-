server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  
  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/

  data:
    mongodb:
      uri: mongodb://localhost:27017/cartdb
    redis:
      repositories:
        enabled: false

# 日志配置
logging:
  level:
    com.example.cart: DEBUG
    org.springframework.web: INFO